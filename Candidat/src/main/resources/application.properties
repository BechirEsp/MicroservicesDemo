spring.application.name=Candidats
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
# Eureka registration (same behavior as Job)
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
server.port=8081
# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
 
# Datasource
spring.datasource.username=Bechir
spring.datasource.password=
#spring.datasource.url=jdbc:h2:file:./Database/Data/Candidat
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto = update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
#   port pour le UI 15672
spring.rabbitmq.username=bechir
spring.rabbitmq.password=bechir