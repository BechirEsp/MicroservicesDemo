spring.application.name=Job

spring.datasource.url=jdbc:mysql://localhost:3306/job_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=bechir
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.cloud.config.enabled=false

#Eureka registration
#awel ma yatlaa l'instance y'enregistry rouhou fel eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka


eureka.instance.prefer-ip-address: true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
#   port pour le UI 15672
spring.rabbitmq.username=bechir
spring.rabbitmq.password=bechir
